<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409eff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="256" cy="256" r="220" fill="url(#circleGradient)" opacity="0.15"/>
  
  <!-- Main background circle -->
  <circle cx="256" cy="256" r="200" fill="url(#logoGradient)"/>
  
  <!-- Inner highlight -->
  <circle cx="240" cy="230" r="160" fill="white" opacity="0.1"/>
  
  <!-- B letter -->
  <text x="256" y="330" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="280" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle"
        filter="url(#glow)">B</text>
  
  <!-- Subtle shine effect -->
  <ellipse cx="256" cy="180" rx="120" ry="60" fill="white" opacity="0.08"/>
</svg>