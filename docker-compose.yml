version: '3.8'

services:
    mysql:
        image: mysql:8.0
        container_name: base-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-NiCaiCai@@}
            MYSQL_DATABASE: ${DB_NAME:-base_system}
            TZ: Asia/Shanghai
        ports:
            - "${DB_PORT:-13306}:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        container_name: base-redis
        restart: unless-stopped
        ports:
            - "${REDIS_PORT:-6379}:6379"
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: base-backend
        restart: unless-stopped
        environment:
            SPRING_PROFILES_ACTIVE: docker
            DB_HOST: mysql
            DB_PORT: 3306
            DB_NAME: ${DB_NAME:-base_system}
            DB_USER: ${DB_USER:-root}
            DB_PASSWORD: ${DB_PASSWORD:-NiCaiCai@@}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${REDIS_PASSWORD:-}
            TZ: Asia/Shanghai
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - upload-data:/data/upload
            - export-data:/data/export
            - app-logs:/app/logs

    nginx:
        image: nginx:alpine
        container_name: base-nginx
        restart: unless-stopped
        ports:
            - "${NGINX_PORT:-80}:80"
        volumes:
            - ./frontend/dist:/usr/share/nginx/html:ro
            - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
            - upload-data:/app/upload:ro
        depends_on:
            - backend

volumes:
    mysql-data:
    redis-data:
    upload-data:
    export-data:
    app-logs:
